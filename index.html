<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Omar & Enikő 🗓️</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#FF6B35">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Our Calendar">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --omar: #FF6B35;
      --eniko: #9B59B6;
      --both: #27AE60;
      --bg: #FDF6EE;
      --surface: #FFFFFF;
      --text: #2C2C2C;
      --muted: #aaa;
      --radius: 14px;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 52px;
    }
    @media (min-width: 900px) {
      body {
        max-width: 960px;
        margin: 0 auto;
      }
    }

    header {
      background: var(--surface);
      text-align: center;
      padding: 16px 16px 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      position: sticky;
      top: 0;
      z-index: 20;
    }
    header h1 {
      font-size: 1.1rem;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      justify-content: space-between;
      width: 100%;
    }
    .you-are {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 3px;
    }
    .you-are button {
      background: none;
      border: none;
      color: var(--muted);
      text-decoration: underline;
      cursor: pointer;
      font-family: inherit;
      font-size: inherit;
      padding: 0;
    }
    .last-updated {
      display: none;
    }

    .top-strip {
      display: block;
      padding: 10px 12px 4px;
    }
    .month-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0;
      min-width: 0;
    }
    .month-nav-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 0;
      flex: 1;
    }
    .month-nav h2 {
      font-size: 1rem;
      font-weight: 800;
      min-width: 110px;
      text-align: center;
      margin: 0;
    }
    .nav-btn {
      background: var(--surface);
      border: 1.5px solid #e0d6cc;
      border-radius: 50%;
      width: 32px; height: 32px;
      font-size: 1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .nav-btn:hover { background: #f0e6da; }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }
    .today-btn {
      background: none;
      border: 1.5px solid #e0d6cc;
      border-radius: 20px;
      padding: 4px 12px;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      color: var(--text);
    }
    .today-btn:hover { background: #f0e6da; }
    .mode-banner {
      margin: 8px 12px 0;
      background: #eef6ff;
      color: #2f5f8f;
      border-left: 4px solid #5b9bd5;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 0.75rem;
      font-weight: 700;
      display: none;
    }
    .holiday-panel {
      margin: 8px 12px 0;
      background: #fff;
      border-radius: 12px;
      border: 1px solid #dbe7f3;
      padding: 10px;
      display: none;
    }
    .holiday-panel.open { display: block; }
    .holiday-panel h3 {
      font-size: 0.82rem;
      font-weight: 800;
      color: #2f5f8f;
      margin-bottom: 8px;
    }
    .holiday-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .holiday-chip {
      border: 1px solid #cddff1;
      background: #f6fbff;
      color: #2f5f8f;
      border-radius: 999px;
      padding: 6px 10px;
      font: inherit;
      font-size: 0.74rem;
      font-weight: 700;
      cursor: pointer;
    }
    .holiday-panel-date {
      font-size: 0.74rem;
      color: #5c7084;
      margin-bottom: 8px;
    }

    #next-weekend-banner {
      background: linear-gradient(135deg, #e8f5e9, #f1f8e9);
      border-left: 4px solid var(--both);
      padding: 8px 10px;
      font-size: 0.72rem;
      color: #1b5e20;
      font-weight: 700;
      text-align: left;
      border-radius: 10px;
      min-width: 0;
      display: block;
      min-height: 44px;
      width: calc(100% - 24px);
      margin: 6px 12px 0;
      box-shadow: inset 0 0 0 1px rgba(39, 174, 96, 0.08);
    }
    #next-weekend-banner .nw-main {
      display: block;
      text-align: left;
      line-height: 1.2;
    }
    #next-weekend-banner .nw-sub {
      font-weight: 400;
      font-size: 0.78rem;
      opacity: 0.8;
      margin-top: 2px;
      display: block;
      text-align: center;
    }

    .key-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      padding: 10px 16px;
      background: #fff;
      border-top: 1px solid #f0e8dc;
      border-bottom: 1px solid #f0e8dc;
      font-size: 0.78rem;
      color: var(--text);
    }
    .key-item { display: flex; align-items: center; gap: 4px; }
    .key-item strong { font-weight: 800; }

    .shared-hint {
      display: none;
    }

    #eniko-tip {
      background: linear-gradient(135deg, #f3e5f5, #ede7f6);
      border-left: 4px solid var(--eniko);
      padding: 10px 16px;
      font-size: 0.82rem;
      color: #4a148c;
      line-height: 1.5;
      text-align: center;
      position: relative;
    }
    #eniko-tip .tip-hu { font-style: italic; font-weight: 700; display: block; }
    #eniko-tip .tip-en { opacity: 0.75; font-size: 0.76rem; display: block; margin-top: 2px; }
    #eniko-tip .tip-close {
      position: absolute;
      top: 6px;
      right: 8px;
      border: none;
      background: none;
      color: #6f4b89;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .key-bh { color: #888; }
    .key-heart { color: var(--both); font-weight: 700; }
    .key-heart .heart-icon { color: var(--both); }

    .best-dates,
    .wishlist {
      margin: 12px 14px 0;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 12px 14px;
      display: none;
    }
    .best-dates { border-left: 4px solid var(--both); }
    .best-dates h3 {
      font-size: 0.85rem;
      font-weight: 800;
      color: var(--both);
      margin-bottom: 6px;
    }
    .best-dates ul {
      list-style: none;
      font-size: 0.8rem;
      line-height: 1.7;
      color: var(--text);
    }
    .best-dates ul li::before { content: "• "; }

    .wishlist { border-left: 4px solid #d6a34f; }
    .wishlist.open { display: block; }
    .wishlist-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .wishlist h3 {
      font-size: 0.85rem;
      font-weight: 800;
      color: #a06a12;
    }
    .wishlist-summary {
      margin-top: 6px;
      font-size: 0.74rem;
      color: #8a7a68;
      cursor: pointer;
      padding: 8px 10px;
      background: #fffaf0;
      border: 1px dashed #ead7b1;
      border-radius: 10px;
    }
    .wishlist-chevron {
      font-size: 0.95rem;
      color: #8a5c13;
      transition: transform 0.18s ease;
    }
    .wishlist.open .wishlist-chevron {
      transform: rotate(180deg);
    }
    .wishlist-body {
      display: none;
      margin-top: 10px;
    }
    .wishlist.open .wishlist-body {
      display: block;
    }
    .wishlist-edit-btn {
      background: none;
      border: 1px solid #ead7b1;
      border-radius: 999px;
      padding: 4px 10px;
      font-family: inherit;
      font-size: 0.72rem;
      font-weight: 700;
      cursor: pointer;
      color: #8a5c13;
    }
    .wishlist-list {
      list-style: none;
      font-size: 0.78rem;
      line-height: 1.6;
      color: var(--text);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .wishlist-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid #f0e0bf;
      border-radius: 10px;
      background: #fffdf9;
      position: relative;
    }
    .wishlist-item.drop-target::before {
      content: '';
      position: absolute;
      left: 8px;
      right: 8px;
      top: -4px;
      height: 3px;
      background: #d6a34f;
      border-radius: 999px;
    }
    .wishlist-item.dragging {
      opacity: 0.55;
    }
    .wishlist-rank {
      min-width: 22px;
      font-size: 0.72rem;
      font-weight: 800;
      color: #a06a12;
    }
    .wishlist-check {
      width: 16px;
      height: 16px;
      accent-color: #d6a34f;
      cursor: pointer;
    }
    .wishlist-text {
      flex: 1;
    }
    .wishlist-text.done {
      text-decoration: line-through;
      opacity: 0.55;
    }
    .wishlist-move {
      border: none;
      background: #f7edd9;
      color: #8a5c13;
      font-size: 0.8rem;
      font-weight: 800;
      cursor: pointer;
      width: 22px;
      height: 22px;
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .wishlist-info {
      border: none;
      background: #f3eee5;
      color: #8a5c13;
      font-size: 0.72rem;
      font-weight: 800;
      cursor: pointer;
      width: 20px;
      height: 20px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .wishlist-delete {
      border: none;
      background: none;
      color: #b56a5c;
      font-size: 0.95rem;
      cursor: pointer;
      padding: 0 2px;
    }
    .wishlist-help {
      margin-top: 8px;
      font-size: 0.7rem;
      color: #8a7a68;
    }
    .wishlist-undo {
      margin-top: 8px;
      font-size: 0.72rem;
      color: #8a5c13;
    }
    .wishlist-undo button {
      border: none;
      background: none;
      color: #8a5c13;
      text-decoration: underline;
      font: inherit;
      cursor: pointer;
      padding: 0;
      margin-left: 6px;
    }
    .wishlist-editor {
      margin-top: 8px;
      display: none;
    }
    .wishlist-editor.open { display: block; }
    .wishlist-textarea {
      width: 100%;
      min-height: 110px;
      resize: vertical;
      border: 1.5px solid #ead7b1;
      border-radius: 10px;
      padding: 10px;
      font-family: inherit;
      font-size: 0.78rem;
      color: var(--text);
      background: #fffdf9;
      outline: none;
    }
    .wishlist-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .wishlist-save,
    .wishlist-cancel {
      border: none;
      border-radius: 999px;
      padding: 6px 12px;
      font-family: inherit;
      font-size: 0.74rem;
      font-weight: 800;
      cursor: pointer;
    }
    .wishlist-save {
      background: #d6a34f;
      color: white;
    }
    .wishlist-cancel {
      background: #f3eee5;
      color: #6f6252;
    }

    .cal-wrap {
      margin: 12px;
      background: var(--surface);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
      padding: 12px 10px 0;
    }
    .dow-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--muted);
      padding: 4px 4px 2px;
      gap: 3px;
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
      padding: 0 0 4px;
    }

    .day {
      background: var(--surface);
      border-radius: 8px;
      padding: 2px 1px 3px;
      height: 88px;
      position: relative;
      border: 1.5px solid transparent;
      transition: border-color 0.2s;
      overflow: hidden;
    }
    .day.has-shared {
      border-color: var(--both);
    }
    .day.today-cell {
      border-color: #FFB347;
      background: #FFFAF4;
    }
    .day.today-cell.today-flash {
      box-shadow: 0 0 0 3px rgba(255, 179, 71, 0.35), 0 0 18px rgba(255, 179, 71, 0.35);
      transform: scale(1.02);
      transition: box-shadow 0.25s ease, transform 0.25s ease;
    }
    .day.past {
      background: #f5f5f5;
      opacity: 0.6;
    }
    .day.empty {
      background: transparent;
      border: none;
      pointer-events: none;
    }

    .day-num {
      font-size: 0.68rem;
      font-weight: 800;
      color: var(--text);
      line-height: 1;
      margin-bottom: 2px;
    }
    .day-top {
      min-height: 20px;
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .day.past .day-num { color: var(--muted); }

    .bh-label,
    .tag-chip {
      font-size: 0.44rem;
      background: #f0e6fa;
      color: #7a4a9c;
      border-radius: 4px;
      padding: 1px 3px;
      display: inline-block;
      font-weight: 700;
      cursor: default;
      margin-left: 2px;
    }
    .tag-chip {
      background: #eef6ff;
      color: #336699;
      cursor: pointer;
    }
    .agreed-chip {
      background: #e8f5e9;
      color: #1b5e20;
      cursor: default;
      max-width: 100%;
      border: none;
      box-shadow: none;
      margin-left: auto;
    }
    .confirm-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      margin-top: 2px;
      font-size: 0.4rem;
      color: #1b5e20;
      font-weight: 700;
    }
    .confirm-row input {
      width: 10px;
      height: 10px;
      margin: 0;
      accent-color: #27AE60;
    }

    .slots {
      display: flex;
      gap: 2px;
      justify-content: center;
      flex-wrap: nowrap;
    }
    .slot-btn {
      flex: 1;
      font-size: 0.5rem;
      font-weight: 700;
      border-radius: 5px;
      padding: 2px 0;
      border: 1.5px solid #e0d6cc;
      background: #f8f4f0;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.12s;
      position: relative;
      min-width: 0;
      text-align: center;
      line-height: 1.4;
    }
    .slot-btn .slot-mark {
      display: block;
      font-size: 0.38rem;
      line-height: 1;
      margin-top: 1px;
      letter-spacing: 0;
      opacity: 0.9;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .slot-btn.mine {
      border-color: currentColor;
      color: var(--user-color, var(--omar));
      background: color-mix(in srgb, var(--user-color, var(--omar)) 15%, white);
    }
    .slot-btn.mine-maybe {
      border-color: currentColor;
      color: var(--user-color, var(--omar));
      background: repeating-linear-gradient(135deg, color-mix(in srgb, var(--user-color, var(--omar)) 10%, white), color-mix(in srgb, var(--user-color, var(--omar)) 10%, white) 4px, white 4px, white 8px);
    }
    .slot-btn.theirs {
      border-color: var(--other-color, var(--eniko));
      color: var(--other-color, var(--eniko));
      background: color-mix(in srgb, var(--other-color, var(--eniko)) 10%, white);
    }
    .slot-btn.both-slot {
      border-color: var(--both);
      color: var(--both);
      background: color-mix(in srgb, var(--both) 15%, white);
    }
    .slot-btn.possible-slot {
      border-color: #7fbf90;
      color: #3d8b57;
      background: repeating-linear-gradient(135deg, #eef9f1, #eef9f1 4px, #ffffff 4px, #ffffff 8px);
    }
    .slot-btn .heart, .slot-btn .slot-mark {
      font-size: 0.5rem;
    }


    #user-overlay {
      position: fixed;
      inset: 0;
      background: rgba(253,246,238,0.97);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 100;
    }
    #user-overlay h2 {
      font-size: 1.6rem;
      font-weight: 800;
    }
    #user-overlay p {
      color: var(--muted);
      font-size: 0.9rem;
    }
    .user-btns {
      display: flex;
      gap: 16px;
    }
    .user-btn {
      padding: 14px 28px;
      border-radius: 16px;
      border: none;
      font-family: inherit;
      font-size: 1.1rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.12s;
    }
    .user-btn:active { transform: scale(0.96); }
    .user-btn.omar { background: var(--omar); color: white; }
    .user-btn.eniko { background: var(--eniko); color: white; }

    #sync-bar {
      text-align: center;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 8px 12px 14px;
      transition: background 0.3s, color 0.3s;
      cursor: default;
    }
    #sync-bar.synced { background: #e8f5e9; color: #2e7d32; }
    #sync-bar.saving { background: #fff8e1; color: #f57f17; }
    #sync-bar.failed { background: #fdecea; color: #c62828; cursor: pointer; }
    .sync-label { font-weight: 800; margin-right: 6px; }
    .sync-detail { font-size: 0.78rem; opacity: 0.85; }


    .bh-tip {
      position: absolute;
      top: 100%;
      left: 0;
      background: #2C2C2C;
      color: white;
      font-size: 0.65rem;
      padding: 4px 8px;
      border-radius: 6px;
      white-space: nowrap;
      z-index: 30;
      pointer-events: none;
    }

    /* ════════════════════════════════════════════════════════
       SOURBERRY-STYLE OVERLAY (appended)
       Retrofits the neobrutalist look: cream + dotted bg,
       Fraunces serif headings, Inter Tight body, hard offset
       shadows on containers, bordered cards/buttons/pills.
       Layout untouched. Omar/Enikő colours preserved.
       ════════════════════════════════════════════════════════ */
    :root {
      --sb-bg: #f6f1e7;
      --sb-bg-card: #fffaf0;
      --sb-ink: #1a0a14;
      --sb-ink-soft: #4a2a3a;
      --sb-line: #2a1018;
      --sb-omar: #FF6B35;
      --sb-eniko: #9B59B6;
    }
    html, body {
      background: var(--sb-bg);
      color: var(--sb-ink);
      font-family: 'Inter Tight', system-ui, -apple-system, sans-serif;
    }
    body {
      background-image: radial-gradient(circle at 1px 1px, rgba(26,10,20,0.08) 1px, transparent 0);
      background-size: 22px 22px;
    }
    @media (max-width: 640px) { body { background-size: 18px 18px; } }

    header h1, h2, h3,
    .best-dates h3, .wishlist-summary, #month-label, .day-num {
      font-family: 'Fraunces', Georgia, serif;
      font-optical-sizing: auto;
      font-variation-settings: "opsz" 144;
      letter-spacing: -0.02em;
    }
    header h1 { font-weight: 800; }

    header {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      border-radius: 0 !important;
      margin: 10px 14px 6px;
      padding: 0;
    }
    header h1 {
      font-size: 1.25rem !important;
      display: flex !important;
      flex-direction: row !important;
      align-items: baseline;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: flex-start !important;
      width: 100%;
    }
    .h1-title { font-weight: 800; }
    .you-are {
      color: var(--sb-ink-soft);
      font-size: 0.85rem;
      font-weight: 400;
      margin-left: auto;
    }
    .you-are button {
      color: var(--sb-eniko);
      font-weight: 600;
      font-family: inherit;
      background: transparent;
      border: none;
      cursor: pointer;
    }

    .nav-btn, .today-btn {
      background: var(--sb-bg-card);
      border: 1.5px solid var(--sb-line);
      box-shadow: 3px 3px 0 var(--sb-line);
      border-radius: 4px;
      color: var(--sb-ink);
      font-family: inherit;
      font-weight: 600;
      transition: transform 80ms ease, box-shadow 80ms ease;
    }
    .nav-btn:hover:not(:disabled), .today-btn:hover {
      transform: translate(-1px,-1px);
      box-shadow: 4px 4px 0 var(--sb-line);
      background: var(--sb-bg-card);
    }

async function applySession(session) {
  currentSession = session;
  const overlay = document.getElementById('user-overlay');

  if (!session) {
    currentUser = null;
    overlay.style.display = 'flex';
    setAuthStatus('');
    return;
  }

  // Map auth user → persona via calendar_members.
  const { data: member, error } = await supabase
    .from('calendar_members')
    .select('member_key, display_name')
    .eq('user_id', session.user.id)
    .maybeSingle();

  if (error || !member) {
    setAuthStatus(`Signed in as ${session.user.email}, but this account isn't mapped to Omar or Enikő. Sign out and use the right address.`);
    overlay.style.display = 'flex';
    return;
  }

  currentUser = member.member_key;
  overlay.style.display = 'none';

  applyUserStyle();
  updateHeader();
  showEnikoTip();

  await loadData();
  renderCalendar();
  renderBestDates();
  renderWishlist();
  setTimeout(() => { try { renderNextWeekend(); } catch {} }, 500);

  subscribeRealtime();
}

function toggleAuthMode() {

    submitBtn.textContent = 'Send magic link';
    toggle.textContent = 'Use password instead';
    msg.textContent = "Enter your email — we'll send a magic sign-in link.";
  } else {
    pwInput.style.display = '';
    pwInput.required = true;
    submitBtn.textContent = 'Sign in';
    toggle.textContent = 'Send me a magic link instead';
    msg.textContent = 'Enter your email and password.';
  }

async function submitAuthForm() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  if (!email) return;
  const btn = document.getElementById('auth-submit');
  btn.disabled = true;

  if (authMode === 'magic') {
    setAuthStatus('Sending magic link…');
    const { error } = await supabase.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: window.location.href.split('#')[0] }
    });
    btn.disabled = false;
    setAuthStatus(error ? 'Error: ' + error.message : `Magic link sent to ${email}. Check your inbox.`);
  } else {
    setAuthStatus('Signing in…');
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    btn.disabled = false;
    if (error) setAuthStatus('Error: ' + error.message);
    // success path: onAuthStateChange handles the rest
  }
}

function relTime(d) {
  const diff = Math.floor((Date.now() - d.getTime()) / 1000);
  if (diff < 60) return 'just now';
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

function renderBestDates() {
  const sec = document.getElementById('best-dates-section');
  const todayStr = isoDate(today);
  const shared = [];
  const allDays = new Set([
    ...Object.keys(data.omar || {}),
    ...Object.keys(data.eniko || {})
  ]);
  for (const d of [...allDays].sort()) {
    if (d < todayStr) continue;
    const s = sharedSlots(d);
    if (s.length) shared.push({ d, s });
  }

  if (!shared.length) { sec.innerHTML = ''; return; }

  const top3 = shared.slice(0, 3);
  const items = top3.map(({ d, s }) => {
    const dt = new Date(d + 'T12:00:00');
    const label = dt.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' });
    const slotNames = s.map(sl => sl.charAt(0).toUpperCase() + sl.slice(1)).join(' & ');
    return `<li>${label} — ${slotNames} ♥</li>`;
  }).join('');

  sec.innerHTML = `
    <div class="best-dates">
      <h3>✨ Best dates</h3>
      <ul>${items}</ul>
    </div>`;
}

function getWishlist() {
  const list = Array.isArray(data.wishlist) ? data.wishlist.filter(Boolean) : [];
  const normalised = list.map(item => {
    if (typeof item === 'string') return { text: item, done: false, meta: defaultWishlistMeta() };
    return { text: item.text || '', done: !!item.done, meta: normaliseWishlistMeta(item.meta) };
  }).filter(item => item.text);
  if (normalised.length) return normalised;
  return DEFAULT_WISHLIST.map(text => ({ text, done: false, meta: defaultWishlistMeta() }));
}

function defaultWishlistMeta() {
  return {
    addedBy: currentUser || 'unknown',
    addedAt: new Date().toISOString(),
    reorderedBy: null,
    reorderedAt: null
  };
}

function normaliseWishlistMeta(meta) {
  return {
    addedBy: meta?.addedBy || currentUser || 'unknown',
    addedAt: meta?.addedAt || new Date().toISOString(),
    reorderedBy: meta?.reorderedBy || null,
    reorderedAt: meta?.reorderedAt || null
  };
}

function updateReorderedMeta(meta) {
  const base = normaliseWishlistMeta(meta);
  base.reorderedBy = currentUser || 'unknown';
  base.reorderedAt = new Date().toISOString();
  return base;
}

function showWishlistInfo(index, event) {
  if (event) event.stopPropagation();
  const item = getWishlist()[index];
  if (!item) return;
  const meta = normaliseWishlistMeta(item.meta);
  alert(`Added by: ${meta.addedBy}
Added at: ${new Date(meta.addedAt).toLocaleString('en-GB')}
Reordered by: ${meta.reorderedBy || '—'}
Reordered at: ${meta.reorderedAt ? new Date(meta.reorderedAt).toLocaleString('en-GB') : '—'}`);
}

function moveWishlistItem(index, delta, event) {
  if (event) event.stopPropagation();
  const wishlist = [...getWishlist()];
  const target = index + delta;
  if (target < 0 || target >= wishlist.length) return;
  const [moved] = wishlist.splice(index, 1);
  wishlist.splice(target, 0, moved);
  if (moved) moved.meta = updateReorderedMeta(moved.meta);
  data.wishlist = wishlist;
  saveWishlistToSupabase();
  renderWishlist();
  renderCalendar();
}

function deleteWishlistItem(index, event) {
  if (event) event.stopPropagation();
  const wishlist = [...getWishlist()];
  const [removed] = wishlist.splice(index, 1);
  lastDeletedWishlistItem = removed ? { item: removed, index } : null;
  data.wishlist = wishlist;
  saveWishlistToSupabase();
  renderWishlist();
  renderCalendar();
}

function undoWishlistDelete(event) {
  if (event) event.stopPropagation();
  if (!lastDeletedWishlistItem) return;
  const wishlist = [...getWishlist()];
  wishlist.splice(lastDeletedWishlistItem.index, 0, lastDeletedWishlistItem.item);
  data.wishlist = wishlist;
  lastDeletedWishlistItem = null;
  saveWishlistToSupabase();
  renderWishlist();
  renderCalendar();
}

function toggleWishlistDone(index, event) {
  if (event) event.stopPropagation();
  const wishlist = [...getWishlist()];

  wishlist[index].done = !wishlist[index].done;

function getSlotState(user, dateKey, slot) {
  const value = data[user]?.[dateKey]?.[slot];
  if (value === 'maybe' || value === 1) return 'maybe';
  if (value === 'free' || value === 2 || value === true) return 'free';
  return 'off';
}

function sharedSlots(dateKey) {
  return SLOTS.filter(s => getSlotState('omar', dateKey, s) === 'free' && getSlotState('eniko', dateKey, s) === 'free');
}

function possibleSharedSlots(dateKey) {
  return SLOTS.filter(s => {
    const o = getSlotState('omar', dateKey, s);
    const e = getSlotState('eniko', dateKey, s);
    return o !== 'off' && e !== 'off' && !(o === 'free' && e === 'free');
  });
}

function renderCalendar() {
  updateNavBtns();
  if (!currentUser) return;

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  const year = viewDate.getFullYear();
  const month = viewDate.getMonth();
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month+1, 0);

  // v0.2 (Sourberry layout): always show 6 weeks × 7 days. Mon-first.
  // Days outside the current month are dimmed via .other-month, not hidden,
  // so the calendar grid is always 42 cells and never jumps height.
  let startDow = firstDay.getDay();
  startDow = (startDow + 6) % 7;
  const gridStart = new Date(year, month, 1 - startDow);

  for (let i = 0; i < 42; i++) {
    const cellDate = new Date(gridStart);
    cellDate.setDate(gridStart.getDate() + i);
    const inMonth = cellDate.getMonth() === month;
    const d = cellDate.getDate();
    const key = isoDate(cellDate);
    const isPast = cellDate < today;
    const isToday = cellDate.getTime() === today.getTime();

    const cell = document.createElement('div');
    cell.className = 'day';
    if (!inMonth) cell.classList.add('other-month');
    if (isPast) cell.classList.add('past');
    if (isToday) cell.classList.add('today-cell');

    const shared = sharedSlots(key);
    const possible = possibleSharedSlots(key);
    if (shared.length || possible.length) cell.classList.add('has-shared');

    const top = document.createElement('div');
    top.className = 'day-top';

    const numEl = document.createElement('div');
    numEl.className = 'day-num';
    numEl.textContent = d;
    top.appendChild(numEl);
    cell.appendChild(top);

    // Out-of-month cells: render just the date number, dimmed. Click → jump to that month.
    if (!inMonth) {
      cell.style.cursor = 'pointer';
      cell.addEventListener('click', () => {
        viewDate = new Date(cellDate.getFullYear(), cellDate.getMonth(), 1);
        renderCalendar(); renderBestDates(); renderWishlist(); updateNavBtns();
      });
      grid.appendChild(cell);
      continue;
    }

    // Shared/possible state is shown via border and slot styling only.

    if (bankHolidays[key]) {
      const bh = document.createElement('div');
      bh.className = 'bh-label';
      bh.textContent = 'BH';
      bh.title = bankHolidays[key];
      bh.addEventListener('click', () => {
        let tip = bh.querySelector('.bh-tip');
        if (!tip) {
          tip = document.createElement('div');
          tip.className = 'bh-tip';
          tip.textContent = bankHolidays[key];
          bh.appendChild(tip);
          setTimeout(() => tip.remove(), 2000);
        }
      });
      top.appendChild(bh);
    }

    const tags = data.dayTags?.[key] || [];
    tags.forEach(tag => {
      const chip = document.createElement('button');
      chip.className = 'tag-chip';
      chip.textContent = tag.label;
      chip.title = `${tag.label} (${tag.by || 'unknown'})`;
      chip.addEventListener('click', (e) => {
        e.stopPropagation();
        holidayEditingDate = key;
        renderHolidayPanel();
      });
      top.appendChild(chip);
    });

    // Plan chips: any plan whose date range covers this cell.
    const cellPlans = (data.plans || []).filter(p => p.start_date <= key && p.end_date >= key);
    cellPlans.forEach(p => {
      const chip = document.createElement('button');
      chip.className = 'plan-chip';
      if (p.start_date === key) chip.classList.add('plan-chip-start');
      if (p.end_date === key) chip.classList.add('plan-chip-end');
      const titleText = p.event_time ? `${p.title} · ${p.event_time}` : p.title;
      chip.textContent = titleText;
      chip.title = [p.title, p.event_time, p.location, p.notes].filter(Boolean).join(' · ');
      chip.addEventListener('click', (e) => { e.stopPropagation(); startEditPlan(p.id); });
      cell.appendChild(chip);
    });

    if (holidayMode) {
      cell.style.cursor = 'pointer';
      cell.addEventListener('click', () => {
        holidayEditingDate = key;
        renderHolidayPanel();
      });
    }

    if (!isPast && !holidayMode) {
      const slotsEl = document.createElement('div');
      slotsEl.className = 'slots slots-dots';

      for (const slot of SLOTS) {
        const row = document.createElement('div');
        row.className = 'slot-row';

        const omarState  = getSlotState('omar',  key, slot);
        const enikoState = getSlotState('eniko', key, slot);
        const bothFree = omarState === 'free' && enikoState === 'free';
        if (bothFree) row.classList.add('both-free');

        const label = document.createElement('span');
        label.className = 'slot-letter';
        label.textContent = SLOT_LABELS[slot].charAt(0);
        row.appendChild(label);

        for (const user of ['omar', 'eniko']) {
          const state = user === 'omar' ? omarState : enikoState;
          const dot = document.createElement('button');
          dot.className = `slot-dot slot-dot-${user} state-${state}`;
          dot.setAttribute('aria-label', `${user === 'omar' ? 'Omar' : 'Enikő'} ${SLOT_LABELS[slot]}: ${state}`);
          dot.title = `${user === 'omar' ? 'Omar' : 'Enikő'}: ${state}`;
          if (user === currentUser) {
            dot.addEventListener('click', () => toggleSlot(key, slot));
          } else {
            dot.disabled = true;
          }
          row.appendChild(dot);
        }

        slotsEl.appendChild(row);
      }
      cell.appendChild(slotsEl);
    }

    grid.appendChild(cell);
  }
}

function toggleSlot(key, slot) {
  if (!currentUser) return;
  if (!data[currentUser]) data[currentUser] = {};
  if (!data[currentUser][key] || Array.isArray(data[currentUser][key])) data[currentUser][key] = {};

  const current = getSlotState(currentUser, key, slot);
  const next = current === 'off' ? 'maybe' : current === 'maybe' ? 'free' : 'off';

  if (next === 'off') delete data[currentUser][key][slot];
  else data[currentUser][key][slot] = next;

  if (data[currentUser][key] && !Object.keys(data[currentUser][key]).length) delete data[currentUser][key];

  setSyncBar('saving', 'Saving…');
  writeAvailability(currentUser, key, slot, next)
    .then(() => setSyncBar('synced', `Synced ${timeStr()}`))
    .catch(() => setSyncBar('failed', 'Save failed — tap to retry'));
  renderCalendar();
  renderBestDates();
  renderWishlist();
}

async function loadData() {
  setSyncBar('saving', 'Loading…');
  try {
    const [avail, notes, wishlist, tags, agreed, lastUpd, plans] = await Promise.all([
      supabase.from('availability').select('member_key,date,slot,state'),
      supabase.from('date_notes').select('member_key,date,note'),
      supabase.from('wishlist_items').select('id,text,done,position,added_by,added_at,reordered_by,reordered_at').order('position', { ascending: true }),
      supabase.from('day_tags').select('date,tag_key,label,set_by,set_at'),
      supabase.from('agreed_dates').select('date,confirmed_by,confirmed_at'),
      supabase.from('last_updated').select('member_key,at'),
      supabase.from('plans').select('id,start_date,end_date,title,event_time,location,notes,added_by,added_at,updated_at').order('start_date', { ascending: true }),
    ]);
    const firstError = [avail, notes, wishlist, tags, agreed, lastUpd, plans].find(r => r.error);
    if (firstError) throw firstError.error;

    const blob = { omar:{}, eniko:{}, notes:{omar:{},eniko:{}}, lastUpdated:{}, wishlist:[], dayTags:{}, agreedDates:{}, plans:[] };
    (avail.data || []).forEach(r => {
      if (!blob[r.member_key][r.date]) blob[r.member_key][r.date] = {};
      blob[r.member_key][r.date][r.slot] = r.state;
    });
    (notes.data || []).forEach(r => {
      if (!blob.notes[r.member_key]) blob.notes[r.member_key] = {};
      blob.notes[r.member_key][r.date] = r.note;
    });
    blob.wishlist = (wishlist.data || []).map(r => ({
      _id: r.id,
      text: r.text,
      done: !!r.done,
      meta: {
        addedBy: r.added_by,
        addedAt: r.added_at,
        reorderedBy: r.reordered_by,
        reorderedAt: r.reordered_at,
      },
    }));
    (tags.data || []).forEach(r => {
      if (!blob.dayTags[r.date]) blob.dayTags[r.date] = [];
      blob.dayTags[r.date].push({ key: r.tag_key, label: r.label, by: r.set_by, at: r.set_at });
    });
    (agreed.data || []).forEach(r => {
      blob.agreedDates[r.date] = { confirmed: true, by: r.confirmed_by, at: r.confirmed_at };
    });
    (lastUpd.data || []).forEach(r => { blob.lastUpdated[r.member_key] = r.at; });
    blob.plans = (plans.data || []).map(r => ({
      id: r.id, start_date: r.start_date, end_date: r.end_date, title: r.title,
      event_time: r.event_time || '', location: r.location || '', notes: r.notes || '',
      added_by: r.added_by, added_at: r.added_at, updated_at: r.updated_at,
    }));

    data = blob;
    setSyncBar('synced', `Synced ${timeStr()}`);
  } catch(e) {
    console.error('loadData failed:', e);
    setSyncBar('failed', 'Load failed — tap to retry');
  }
}

// ── Targeted Supabase writes ───────────────────────────────
async function writeAvailability(member, date, slot, state) {
  if (state === 'off') {
    await supabase.from('availability').delete().match({ member_key: member, date, slot });
  } else {
    await supabase.from('availability').upsert({ member_key: member, date, slot, state });
  }
  await touchLastUpdated();
}

async function writeAgreedDate(date, confirmed) {
  if (!confirmed) {
    await supabase.from('agreed_dates').delete().eq('date', date);
  } else {
    await supabase.from('agreed_dates').upsert({
      date, confirmed_by: currentUser || 'unknown', confirmed_at: new Date().toISOString(),
    });
  }
  await touchLastUpdated();
}

async function writeDayTagsForDate(date, tags) {
  // Replace all tags for a date with the given list (may be empty).
  await supabase.from('day_tags').delete().eq('date', date);
  if (tags.length) {
    await supabase.from('day_tags').insert(tags.map(t => ({
      date, tag_key: t.key, label: t.label,
      set_by: currentUser || 'unknown', set_at: t.at || new Date().toISOString(),
    })));
  }
  await touchLastUpdated();
}

async function writeWishlistFull(items) {
  // Wishlist mutations replace the whole list; we mirror that with delete+insert.
  await supabase.from('wishlist_items').delete().neq('id', '00000000-0000-0000-0000-000000000000');
  if (items.length) {
    await supabase.from('wishlist_items').insert(items.map((it, i) => ({
      text: it.text, done: !!it.done, position: i,
      added_by: ['omar','eniko'].includes(it.meta?.addedBy) ? it.meta.addedBy : 'unknown',
      added_at: it.meta?.addedAt || new Date().toISOString(),
      reordered_by: ['omar','eniko'].includes(it.meta?.reorderedBy) ? it.meta.reorderedBy : null,
      reordered_at: it.meta?.reorderedAt || null,
    })));
  }
  await touchLastUpdated();
}

// ── Plans (shared bookings) ────────────────────────────────
async function writePlanCreate(plan) {
  const { data: row, error } = await supabase.from('plans').insert({
    start_date: plan.start_date,
    end_date: plan.end_date,
    title: plan.title,
    event_time: plan.event_time || null,
    location: plan.location || null,
    notes: plan.notes || null,
    added_by: currentUser || 'unknown',
  }).select().single();
  if (error) throw error;
  await touchLastUpdated();
  return row;
}

async function writePlanUpdate(id, patch) {
  const cleaned = {
    start_date: patch.start_date,
    end_date: patch.end_date,
    title: patch.title,
    event_time: patch.event_time || null,
    location: patch.location || null,
    notes: patch.notes || null,
  };
  const { error } = await supabase.from('plans').update(cleaned).eq('id', id);
  if (error) throw error;
  await touchLastUpdated();
}

async function writePlanDelete(id) {
  const { error } = await supabase.from('plans').delete().eq('id', id);
  if (error) throw error;
  await touchLastUpdated();
}

async function touchLastUpdated() {
  if (!currentUser) return;
  const at = new Date().toISOString();
  data.lastUpdated = data.lastUpdated || {};
  data.lastUpdated[currentUser] = at;
  updateHeader();
  setSyncBar('synced', `Synced ${timeStr()}`);
  try { await supabase.from('last_updated').upsert({ member_key: currentUser, at }); } catch {}
}

// ── Realtime ───────────────────────────────────────────────
function subscribeRealtime() {
  if (realtimeChannel) return;
  realtimeChannel = supabase
    .channel('eniko-calendar')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'availability' },   () => debouncedReload())
    .on('postgres_changes', { event: '*', schema: 'public', table: 'date_notes' },     () => debouncedReload())
    .on('postgres_changes', { event: '*', schema: 'public', table: 'wishlist_items' }, () => debouncedReload())
    .on('postgres_changes', { event: '*', schema: 'public', table: 'day_tags' },       () => debouncedReload())
    .on('postgres_changes', { event: '*', schema: 'public', table: 'agreed_dates' },   () => debouncedReload())
    .on('postgres_changes', { event: '*', schema: 'public', table: 'last_updated' },   () => debouncedReload())
    .on('postgres_changes', { event: '*', schema: 'public', table: 'plans' },          () => debouncedReload())
    .subscribe();
}

let reloadTimer = null;
function debouncedReload() {
  clearTimeout(reloadTimer);
  reloadTimer = setTimeout(async () => {
    await loadData();
    updateHeader();
    renderCalendar();
    renderBestDates();
    renderWishlist();
    renderPlansPanel();
  }, 400);
}

// ── Plans UI ───────────────────────────────────────────────
function togglePlansPanel(event) {
  if (event) event.stopPropagation();
  plansOpen = !plansOpen;
  if (!plansOpen) editingPlanId = null;
  renderPlansPanel();
}

function closePlansPanel() {
  plansOpen = false;
  editingPlanId = null;
  renderPlansPanel();
}

function startNewPlan(prefillDate) {
  const today = isoDate(new Date());
  const startDate = prefillDate || today;
  editingPlanId = 'new';
  plansOpen = true;
  renderPlansPanel(() => {
    const s = document.getElementById('plan-start-date');
    if (s) s.value = startDate;
    const e = document.getElementById('plan-end-date');
    if (e) e.value = startDate;
    const t = document.getElementById('plan-title');
    if (t) t.focus();
  });
}

function startEditPlan(id) {
  editingPlanId = id;
  plansOpen = true;
  renderPlansPanel(() => {
    const plan = (data.plans || []).find(p => p.id === id);
    if (!plan) return;
    const get = i => document.getElementById(i);
    if (get('plan-start-date')) get('plan-start-date').value = plan.start_date;
    if (get('plan-end-date')) get('plan-end-date').value = plan.end_date;
    if (get('plan-title')) get('plan-title').value = plan.title || '';
    if (get('plan-time')) get('plan-time').value = plan.event_time || '';
    if (get('plan-location')) get('plan-location').value = plan.location || '';
    if (get('plan-notes')) get('plan-notes').value = plan.notes || '';
  });
}

function cancelPlanForm() {
  editingPlanId = null;
  renderPlansPanel();
}

async function savePlan() {
  const get = i => document.getElementById(i).value.trim();
  const plan = {
    start_date: get('plan-start-date'),
    end_date: get('plan-end-date'),
    title: get('plan-title'),
    event_time: get('plan-time'),
    location: get('plan-location'),
    notes: get('plan-notes'),
  };
  if (!plan.start_date || !plan.end_date) { alert('Pick a start and end date.'); return; }
  if (!plan.title) { alert('Give the plan a title.'); return; }
  if (plan.end_date < plan.start_date) { alert('End date must be on or after the start date.'); return; }
  setSyncBar('saving', 'Saving…');
  try {
    if (editingPlanId === 'new') {
      const row = await writePlanCreate(plan);
      data.plans.push({
        id: row.id, start_date: row.start_date, end_date: row.end_date, title: row.title,
        event_time: row.event_time || '', location: row.location || '', notes: row.notes || '',
        added_by: row.added_by, added_at: row.added_at, updated_at: row.updated_at,
      });
    } else {
      await writePlanUpdate(editingPlanId, plan);
      const idx = data.plans.findIndex(p => p.id === editingPlanId);
      if (idx >= 0) data.plans[idx] = Object.assign(data.plans[idx], plan);
    }
    editingPlanId = null;
    setSyncBar('synced', `Synced ${timeStr()}`);
  } catch (e) {
    console.error('savePlan failed:', e);
    setSyncBar('failed', 'Save failed — tap to retry');
  }
  renderPlansPanel();
  renderCalendar();
}

async function deletePlan(id) {
  const plan = (data.plans || []).find(p => p.id === id);
  if (!plan) return;
  if (!confirm(`Delete "${plan.title}"?`)) return;
  setSyncBar('saving', 'Saving…');
  try {
    await writePlanDelete(id);
    data.plans = data.plans.filter(p => p.id !== id);
    if (editingPlanId === id) editingPlanId = null;
    setSyncBar('synced', `Synced ${timeStr()}`);
  } catch (e) {
    console.error('deletePlan failed:', e);
    setSyncBar('failed', 'Save failed — tap to retry');
  }
  renderPlansPanel();
  renderCalendar();
}

function formatPlanDateRange(plan) {
  const fmt = iso => {
    const d = new Date(iso + 'T12:00:00');
    return d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
  };
  if (plan.start_date === plan.end_date) return fmt(plan.start_date);
  return `${fmt(plan.start_date)} → ${fmt(plan.end_date)}`;
}

function renderPlansPanel(afterRender) {
  const panel = document.getElementById('plans-panel');
  if (!panel) return;
  if (!plansOpen) {
    panel.classList.remove('open');
    panel.innerHTML = '';
    return;
  }
  panel.classList.add('open');
  const plans = (data.plans || []).slice().sort((a,b) => a.start_date.localeCompare(b.start_date));
  const today = isoDate(new Date());
  const upcoming = plans.filter(p => p.end_date >= today);
  const past = plans.filter(p => p.end_date < today);

  const editing = editingPlanId !== null;
  let html = `
    <div class="panel-head">
      <h3>Plans</h3>
      <button class="panel-close" onclick="closePlansPanel()" aria-label="Close plans">✕</button>
    </div>`;

  if (!editing) {
    html += `<button class="holiday-chip plans-add" onclick="startNewPlan()">+ Add plan</button>`;
  }

  if (editing) {
    html += `
      <div class="plan-form">
        <div class="plan-form-row two">
          <label>Start date<input type="date" id="plan-start-date"></label>
          <label>End date<input type="date" id="plan-end-date"></label>
        </div>
        <label>Title<input type="text" id="plan-title" placeholder="Dinner with Adam &amp; Rachel" maxlength="120"></label>
        <label>Time (optional)<input type="text" id="plan-time" placeholder="7pm" maxlength="40"></label>
        <label>Location (optional)<input type="text" id="plan-location" placeholder="The Wolseley" maxlength="120"></label>
        <label>Notes (optional)<textarea id="plan-notes" rows="2" placeholder="Booking ref, who's coming…"></textarea></label>
        <div class="plan-form-actions">
          <button class="holiday-chip" onclick="savePlan()">Save</button>
          <button class="holiday-chip" onclick="cancelPlanForm()">Cancel</button>
          ${editingPlanId !== 'new' ? `<button class="holiday-chip plan-delete" onclick="deletePlan('${editingPlanId}')">Delete</button>` : ''}
        </div>
      </div>`;
  }

  html += `<div class="plans-list">`;
  if (upcoming.length === 0 && !editing) {
    html += `<p class="plans-empty">No upcoming plans.</p>`;
  } else if (!editing) {
    upcoming.forEach(p => {
      html += planRowHtml(p);
    });
  }
  if (!editing && past.length) {
    html += `<details class="plans-past"><summary>Past (${past.length})</summary>`;
    past.slice().reverse().forEach(p => { html += planRowHtml(p); });
    html += `</details>`;
  }
  html += `</div>`;

  panel.innerHTML = html;
  if (typeof afterRender === 'function') afterRender();
}

function planRowHtml(p) {
  const dateLabel = escapeHtml(formatPlanDateRange(p));
  const time = p.event_time ? `<span class="plan-time">· ${escapeHtml(p.event_time)}</span>` : '';
  const loc = p.location ? `<div class="plan-loc">📍 ${escapeHtml(p.location)}</div>` : '';
  const notes = p.notes ? `<div class="plan-notes">${escapeHtml(p.notes)}</div>` : '';
  return `
    <div class="plan-item" onclick="startEditPlan('${p.id}')">
      <div class="plan-title">${escapeHtml(p.title)}</div>
      <div class="plan-date">${dateLabel}${time}</div>
      ${loc}${notes}
    </div>`;
}

function wmoEmoji(code) {
  if (code === 0) return '☀️';
  if (code <= 2) return '🌤️';
  if (code === 3) return '☁️';
  if (code <= 49) return '🌫️';
  if (code <= 57) return '🌧️';
  if (code <= 67) return '🌧️';
  if (code <= 77) return '❄️';
  if (code <= 82) return '🌦️';
  if (code <= 86) return '🌨️';
  if (code <= 99) return '⚡';
  return '🌡️';
}

function getDateIdea(shared, weather) {
  const rainy = weather && weather.code >= 51;
  const sunny = weather && weather.code <= 2;
  const wishlist = getWishlist().filter(item => !item.done);

  const bucket = shared.includes('evening') ? 'evening'
    : shared.includes('afternoon') ? 'afternoon'
    : shared.includes('morning') ? 'morning'
    : 'any';

  const scored = wishlist.map(item => {
    const lower = item.toLowerCase();
    let score = 0;

    if (bucket === 'morning' && /brunch|breakfast|coffee|walk/.test(lower)) score += 3;
    if (bucket === 'afternoon' && /walk|park|museum|gallery|coffee|lunch|picnic|bookshop/.test(lower)) score += 3;
    if (bucket === 'evening' && /dinner|drink|cocktail|wine|cinema|dessert/.test(lower)) score += 3;

    if (sunny && /walk|park|picnic|stroll|outdoor/.test(lower)) score += 3;
    if (rainy && /museum|gallery|cinema|coffee|café|dessert|indoor|bar|dinner/.test(lower)) score += 3;

    if (!sunny && !rainy) score += 1;

    return { item, score };
  }).sort((a, b) => b.score - a.score);

  const picked = scored[0]?.item || 'Plan something nice';
  let why = '';
  if (bucket === 'morning') why += 'morning';
  if (bucket === 'afternoon') why += 'afternoon';
  if (bucket === 'evening') why += 'evening';
  if (sunny) why += (why ? ' + sunny' : 'sunny');
  if (rainy) why += (why ? ' + rainy' : 'rainy');

  return why ? `✨ ${picked} · ${why}` : `✨ ${picked}`;
}

async function loadWeather() {
  try {
    const res = await fetch(WEATHER_URL);
    if (!res.ok) return;
    const json = await res.json();
    const dates = json.daily.time;
    dates.forEach((d, i) => {
      weatherData[d] = {
        code: json.daily.weathercode[i],
        max: Math.round(json.daily.temperature_2m_max[i]),
        min: Math.round(json.daily.temperature_2m_min[i])
      };
    });
  } catch(e) {}
}

function fmtLastUpdated(isoStr) {
  if (!isoStr) return 'never';
  const d = new Date(isoStr);
  const date = d.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
  const time = d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
  return `${date} ${time}`;
}

function syncBarText() {
  const oTs = fmtLastUpdated(data.lastUpdated?.omar);
  const eTs = fmtLastUpdated(data.lastUpdated?.eniko);
  return `<span class="sync-dot sync-dot-omar"></span>Omar: ${oTs}  &nbsp; <span class="sync-dot sync-dot-eniko"></span>Enikő: ${eTs}`;
}

function setSyncBar(state, msg) {
  const bar = document.getElementById('sync-bar');
  bar.className = state;
  bar.innerHTML = state === 'synced'
    ? `<span class="sync-label">Synced</span> <span class="sync-detail">${syncBarText()}</span>`
    : msg;
  if (state === 'failed') {
    bar.onclick = () => { doSave(); };
  } else {
    bar.onclick = null;
  }
}

function isoDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function timeStr() {
  return new Date().toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
}

function escapeHtml(str) {
  return String(str)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

init();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
</body>
</html>
